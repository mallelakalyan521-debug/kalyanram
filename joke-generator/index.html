<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <div class="header">
                <h1>😂 Joke Generator</h1>
                <p>Get a laugh with a random joke!</p>
            </div>

            <div class="joke-display">
                <div id="joke-content" class="joke-text">
                    <p>Click the button to generate a joke...</p>
                </div>
            </div>

            <div class="button-group">
                <button id="generate-btn" class="btn btn-primary">Get Random Joke</button>
                <button id="copy-btn" class="btn btn-secondary">Copy Joke</button>
                <button id="share-btn" class="btn btn-secondary">Share Joke</button>
            </div>

            <div class="joke-filters">
                <h3>Filter by Category:</h3>
                <div class="category-buttons">
                    <button class="category-btn active" data-category="any">Any</button>
                    <button class="category-btn" data-category="general">General</button>
                    <button class="category-btn" data-category="programming">Programming</button>
                    <button class="category-btn" data-category="knock-knock">Knock-Knock</button>
                </div>
            </div>

            <div class="history">
                <h3>Recent Jokes:</h3>
                <div id="history-list" class="history-list">
                    <p class="empty-message">No jokes yet. Generate one!</p>
                </div>
            </div>

            <div class="loader" id="loader" style="display: none;">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
